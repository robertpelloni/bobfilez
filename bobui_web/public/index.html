<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BobUI Web — OmniShell Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div id="shell">
        <!-- Desktop Area -->
        <main id="desktop">
            <div id="window-area">
                <!-- Dynamic windows will be injected here -->
                <div class="window" id="explorer">
                    <header class="window-header">
                        <span class="icon">📁</span>
                        <span class="title">Filez Web Explorer</span>
                        <div class="window-controls">
                            <span>－</span><span>▢</span><span>✕</span>
                        </div>
                    </header>
                    <div class="window-content">
                        <div class="sidebar">
                            <nav>
                                <ul>
                                    <li>⭐ Quick access</li>
                                    <li>☁️ S3 Bucket</li>
                                    <li>☁️ Google Drive</li>
                                    <li>💻 This PC</li>
                                </ul>
                            </nav>
                        </div>
                        <div class="file-list">
                            <table>
                               <thead>
                                   <tr><th>Name</th><th>Size</th><th>Date</th></tr>
                               </thead>
                               <tbody id="file-body">
                                   <!-- Files injected here -->
                               </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Taskbar -->
            <footer id="taskbar">
                <div class="start-button">⊞</div>
                <div class="taskbar-icons">
                    <div class="active">📁</div>
                    <div>🔍</div>
                    <div>🔄</div>
                    <div>🔢</div>
                    <div>🛡️</div>
                </div>
                <div class="system-tray">
                    <span id="tray-clock">11:11 PM</span>
                </div>
            </footer>
        </main>

        <div style="position: fixed; top: 16px; right: 20px; z-index: 1000; background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(148,163,184,0.25); border-radius: 12px; padding: 10px 14px; backdrop-filter: blur(12px);">
            <a href="/react/" style="color: #7dd3fc; text-decoration: none; font-weight: 700;">Open React Web UI ↗</a>
        </div>

        <!-- Notification Center -->
        <aside id="notification-center">
            <h3>Notifications</h3>
            <div class="notification-list" id="notif-list">
                <!-- Notifications here -->
            </div>
        </aside>
    </div>
    <script src="app.js"></script>
</body>
</html>
