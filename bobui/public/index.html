<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BobUI — bobfilez File Manager</title>
  <meta name="description" content="dupeGuru-style duplicate finder and file management GUI for bobfilez">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">B</div>
        <div>
          <h1>BobUI</h1>
          <span class="version">v2.3.9</span>
        </div>
      </div>

      <div class="nav-section">Find & Fix</div>
      <div class="nav-item active" data-view="duplicates">
        <span class="icon">🔍</span> Duplicate Finder
      </div>
      <div class="nav-item" data-view="scanner">
        <span class="icon">📂</span> File Scanner
      </div>
      <div class="nav-item" data-view="stats">
        <span class="icon">📊</span> Statistics
      </div>

      <div class="nav-section">Manage</div>
      <div class="nav-item" data-view="ignore">
        <span class="icon">🚫</span> Ignore Rules
      </div>
      <div class="nav-item" data-view="history">
        <span class="icon">📜</span> History
      </div>
    </aside>

    <!-- Top Bar -->
    <header class="topbar">
      <span class="topbar-title" id="viewTitle">Duplicate Finder</span>
      <div class="topbar-stats" id="topbarStats"></div>
    </header>

    <!-- Main Content -->
    <main class="main" id="mainContent">
      <!-- Injected by JS -->
    </main>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <h3>⚠️ Confirm Deletion</h3>
      <p id="deleteModalText">Are you sure you want to delete the selected files? This cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-danger" id="confirmDeleteBtn">Delete Files</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
